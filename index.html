<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Predictor Pro | احمد محمد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --accent: #00f2ff; --bg: #05070a; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        .score-input { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: var(--accent); font-size: 1.5rem; font-weight: 900; width: 60px; height: 60px; text-align: center; }
        .hidden-section { display: none; }
        ::-webkit-scrollbar { display: none; }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-left: 5px; }
    </style>
</head>
<body class="pb-24">

    <div id="notif-bar" class="fixed top-[-100%] left-0 w-full glass z-[100] p-6 transition-all duration-500 rounded-b-[2rem] border-b border-accent/30 text-center">
        <h4 class="text-accent font-black text-xs mb-3 tracking-widest">تنبيهات أحمد محمد 🔔</h4>
        <p class="text-[11px] font-bold">باقي 10 دقائق على قفل توقعات مباراة القمة! ⚽</p>
        <button onclick="toggleNotif()" class="mt-4 text-[10px] text-white/30 uppercase">إغلاق</button>
    </div>

    <header class="w-full max-w-md p-6 flex justify-between items-center animate__animated animate__fadeInDown">
        <button onclick="toggleNotif()" class="p-2 glass rounded-full relative">
            <span>🔔</span>
            <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full animate-ping"></span>
        </button>
        <div class="text-center">
            <h1 class="text-lg font-black italic tracking-tighter">احمد محمد <span class="text-accent">PRO</span></h1>
            <span class="text-[8px] bg-yellow-500 text-black px-2 py-0.5 rounded-full font-black shadow-[0_0_10px_#ffae00]">LEGEND 👑</span>
        </div>
        <div class="w-10 h-10 rounded-full border-2 border-accent p-0.5"><img src="https://via.placeholder.com/100" class="rounded-full"></div>
    </header>

    <main id="home-sec" class="w-full max-w-md px-4 space-y-6 animate__animated animate__fadeIn">
        <div class="glass rounded-[2.5rem] p-6 relative overflow-hidden">
