<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Predictor Pro 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mainbg: '#050810',
                        glass: 'rgba(255, 255, 255, 0.03)',
                        borderGlass: 'rgba(255, 255, 255, 0.1)',
                        accent: '#00f2ff', // نيون سايان
                        gold: '#ffae00'
                    },
                    backgroundImage: {
                        'gradient-main': 'linear-gradient(135deg, #050810 0%, #0d1224 100%)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: fixed no-repeat;
            background-image: theme('backgroundImage.gradient-main');
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #fff;
            user-select: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
        }
        .neon-shadow { box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        .score-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        .score-input:focus {
            border-color: #00f2ff;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
            outline: none;
        }
        .team-logo { filter: drop-shadow(0 0 8px rgba(255,255,255,0.2)); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 animate__animated animate__fadeIn">

    <div class="glass-card p-4 mb-6 flex items-center justify-between border-t border-white/10 shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="relative">
                <img id="user-img" src="https://via.placeholder.com/100" class="w-12 h-12 rounded-full border-2 border-accent p-0.5">
                <div class="absolute -bottom-1 -right-1 bg-green-500 w-3 h-3 rounded-full border-2 border-mainbg"></div>
            </div>
            <div>
                <h1 id="user-name" class="font-bold text-sm tracking-wide">جاري الاتصال...</h1>
                <div class="flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-accent rounded-full animate-pulse"></span>
                    <span class="text-[10px] text-gray-400 uppercase font-medium">الترتيب: #14</span>
                </div>
            </div>
        </div>
        <div class="text-center px-4 py-2 bg-white/5 rounded-2xl border border-white/5">
            <span class="text-[10px] text-gray-400 block mb-0.5">النقاط الكلية</span>
            <span class="text-xl font-black text-gold tracking-tighter">2,840</span>
        </div>
    </div>

    <div class="mb-4 flex items-center justify-between px-2">
        <h2 class="text-sm font-bold text-white/70 flex items-center gap-2">
            <svg class="w-4 h-4 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            أهم مباريات اليوم
        </h2>
        <span class="text-[10px] bg-red-500/20 text-red-400 px-2 py-1 rounded-full border border-red-500/30">مباشر</span>
    </div>

    <div class="glass-card overflow-hidden relative mb-6">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-accent to-transparent opacity-50"></div>
        
        <div class="p-6">
            <div class="flex items-center justify-between mb-8">
                <div class="flex-1 text-center">
                    <img src="https://crests.football-data.org/86.png" class="w-16 h-16 mx-auto mb-3 team-logo animate__animated animate__zoomIn">
                    <span class="block text-xs font-black tracking-widest uppercase">ريال مدريد</span>
                </div>

                <div class="flex-col text-center px-4">
                    <div class="text-[10px] text-accent font-bold mb-1">صافرة البداية</div>
                    <div class="text-2xl font-black tracking-widest opacity-20">VS</div>
                    <div class="text-[10px] text-gray-500 mt-1 font-mono uppercase">22:00</div>
                </div>

                <div class="flex-1 text-center">
                    <img src="https://crests.football-data.org/57.png" class="w-16 h-16 mx-auto mb-3 team-logo animate__animated animate__zoomIn">
                    <span class="block text-xs font-black tracking-widest uppercase">أرسنال</span>
                </div>
            </div>

            <div class="flex items-center gap-4 mb-6">
                <input type="number" id="scA" placeholder="0" class="score-input w-full h-16 rounded-2xl text-center text-3xl font-black text-accent">
                <div class="h-0.5 w-6 bg-white/10"></div>
                <input type="number" id="scB" placeholder="0" class="score-input w-full h-16 rounded-2xl text-center text-3xl font-black text-accent">
            </div>

            <button onclick="confirmPred()" class="w-full h-14 bg-accent text-mainbg font-black rounded-2xl shadow-[0_0_20px_rgba(0,242,255,0.4)] active:scale-95 transition-all duration-300 uppercase text-sm tracking-widest">
