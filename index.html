<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Predictor Pro | احمد محمد</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        :root { --accent: #00f2ff; --bg: #05070a; --glass: rgba(255, 255, 255, 0.05); }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #1a2238 0%, #05070a 100%);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* الهيدر */
        header {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area { text-align: center; }
        .logo-area h1 { margin: 0; font-size: 18px; font-weight: 900; font-style: italic; }
        .badge { background: #eab308; color: black; font-size: 8px; padding: 2px 8px; border-radius: 10px; font-weight: 900; display: inline-block; box-shadow: 0 0 10px #ffae00; }

        /* كارت المباراة */
        .match-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            width: 90%;
            max-width: 380px;
            padding: 25px;
            margin-top: 20px;
            text-align: center;
            position: relative;
        }

        .live-tag {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(255,0,0,0.1);
            color: #ff4444;
            font-size: 9px;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .teams-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        .team { flex: 1; cursor: pointer; }
        .team img { width: 60px; height: 60px; object-fit: contain; }
        .team p { font-size: 11px; font-weight: 900; margin-top: 10px; }

        .vs { font-size: 20px; font-weight: 900; opacity: 0.1; font-style: italic; }

        /* مدخلات النتائج */
        .inputs-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .score-input {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--accent);
            border-radius: 15px;
            width: 65px;
            height: 65px;
            color: var(--accent);
            font-size: 24px;
            font-weight: 900;
            text-align: center;
            outline: none;
        }

        .btn-send {
            background: var(--accent);
            color: black;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 11px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-send:active { transform: scale(0.95); }

        /* شريط التنقل السفلي */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .nav-item { color: #555; text-decoration: none; font-size: 10px; font-weight: bold; text-align: center; background: none; border: none; cursor: pointer; }
        .nav-item.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        /* نافذة التفاصيل */
        #drawer {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 70%;
            background: #0a0e17;
            border-top: 2px solid var(--accent);
            border-radius: 30px 30px 0 0;
            z-index: 200;
            padding: 30px;
            transition: 0.5s;
            overflow-y: auto;
        }

    </style>
</head>
<body>

    <header>
        <button onclick="alert('لا توجد تنبيهات حالياً')" style="background:none; border:none; font-size:20px; cursor:pointer;">🔔</button>
        <div class="logo-area">
            <h1>احمد محمد PRO</h1>
            <span class="badge">LEGEND 👑</span>
        </div>
        <div style="width:40px; height:40px; border-radius:50%; border:2px solid var(--accent); overflow:hidden;">
            <img src="https://via.placeholder.com/100" style="width:100%;">
        </div>
    </header>

    <div class="match-card">
        <div class="live-tag">
            <span style="width:8px; height:8px; background:red; border-radius:50%;"></span> مباشر 72'
        </div>
        
        <div class="teams-row">
            <div class="team" onclick="openTeam('ريال مدريد')">
                <img src="https://crests.football-data.org/86.png">
                <p>ريال مدريد</p>
            </div>
            <div class="vs">VS</div>
            <div class="team" onclick="openTeam('أرسنال')">
                <img src="https://crests.football-data.org/57.png">
                <p>أرسنال</p>
            </div>
        </div>

        <div class="inputs-row">
            <input type="number" class="score-input" placeholder="0">
            <input type="number" class="score-input" placeholder="0">
        </div>

        <button class="btn-send" onclick="alert('تم إرسال التوقع بنجاح!')">تأكيد التوقع</button>
    </div>

    <div id="drawer">
        <h2 id="team-title" style="color:var(--accent); text-align:center;"></h2>
        <hr style="opacity:0.1; margin:20px 0;">
        <p style="font-size:12px; color:#888;">التشكيلة المتوقعة:</p>
        <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-bottom:10px;">
            <span style="color:var(--accent); font-weight:bold;">07</span> فينيسيوس جونيور - <span style="color:green;">جاهز ✅</span>
        </div>
        <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; opacity:0.5;">
            <span style="color:#555; font-weight:bold;">05</span> جود بيلينجهام - <span style="color:red;">مصاب 🚑</span>
        </div>
        <button onclick="closeTeam()" style="width:100%; margin-top:30px; background:none; border:1px solid #333; color:#555; padding:10px; border-radius:10px; cursor:pointer;">إغلاق</button>
    </div>

    <nav>
        <button class="nav-item active">🏠<br>الرئيسية</button>
        <button class="nav-item" onclick="alert('قريباً')">📊<br>إحصائيات</button>
        <button class="nav-item" onclick="alert('قريباً')">👤<br>بروفايلي</button>
    </nav>

    <script>
        function openTeam(name) {
            document.getElementById('team-title').innerText = name;
            document.getElementById('drawer').style.bottom = '0';
        }
        function closeTeam() {
            document.getElementById('drawer').style.bottom = '-100%';
        }
    </script>
</body>
</html>
