<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة توقعات الكرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tdark: '#0a0f1e',
                        tcard: '#161b2e',
                        tprimary: '#38bdf8',
                        taccent: '#f59e0b'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: sans-serif; background-color: #0a0f1e; color: white; }
        .team-card { transition: all 0.3s; border: 2px solid transparent; }
        .team-card.selected { border-color: #38bdf8; background: rgba(56,189,248,0.1); }
    </style>
</head>
<body class="p-4">

    <header class="flex items-center justify-between mb-6 p-4 bg-tcard rounded-2xl border border-gray-800">
        <div class="flex items-center gap-3">
            <img id="u_photo" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full border border-tprimary">
            <div>
                <h1 id="u_name" class="font-bold text-lg">جاري التعرف...</h1>
                <p class="text-xs text-gray-400">نظام التوقعات الذكي</p>
            </div>
        </div>
        <div class="text-left bg-tdark p-2 rounded-lg border border-gray-700">
            <span id="u_points" class="text-xl font-bold text-taccent">0</span>
            <span class="text-[10px] text-gray-400 block">نقطة</span>
        </div>
    </header>

    <div id="matches_container">
        <div class="bg-tcard rounded-2xl p-5 mb-4 border border-gray-800">
            <div class="flex justify-between text-[10px] text-gray-500 mb-3">
                <span>دوري أبطال أوروبا</span>
                <span class="text-red-400">يقفل قبل 30 د من الصافرة</span>
            </div>

            <div class="flex items-center justify-between mb-4">
                <div onclick="selectT(1,'A')" id="t1A" class="team-card flex-1 text-center p-2 rounded-xl bg-tdark">
                    <img src="https://crests.football-data.org/86.png" class="w-10 h-10 mx-auto mb-1">
                    <p class="text-xs font-bold">ريال مدريد</p>
                </div>
                <div class="px-3 font-black text-gray-600 italic">VS</div>
                <div onclick="selectT(1,'B')" id="t1B" class="team-card flex-1 text-center p-2 rounded-xl bg-tdark">
                    <img src="https://crests.football-data.org/57.png" class="w-10 h-10 mx-auto mb-1">
                    <p class="text-xs font-bold">أرسنال</p>
                </div>
            </div>

            <div class="flex gap-4 mb-4">
                <input type="number" id="sc1A" placeholder="0" class="flex-1 bg-tdark border border-gray-700 p-2 rounded-lg text-center font-bold text-tprimary">
                <input type="number" id="sc1B" placeholder="0" class="flex-1 bg-tdark border border-gray-700 p-2 rounded-lg text-center font-bold text-tprimary">
            </div>

            <button onclick="sendPred(1)" class="w-full py-3 bg-tprimary text-tdark font-bold rounded-xl active:scale-95 transition">إرسال التوقع</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. إظهار اسم المستخدم الحقيقي وصورته
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            document.getElementById('u_name').innerText = user.first_name + (user.last_name ? " " + user.last_name : "");
            if (user.photo_url) document.getElementById('u_photo').src = user.photo_url;
        }

        // 2. اختيار الفريق
        function selectT(id, side) {
            document.getElementById(`t${id}A`).classList.remove('selected');
            document.getElementById(`t${id}B`).classList.remove('selected');
            document.getElementById(`t${id}${side}`).classList.add('selected');
        }

        // 3. إرسال التوقع إلى Google Sheets
        function sendPred(id) {
            const sA = document.getElementById(`sc${id}A`).value;
            const sB = document.getElementById(`sc${id}B`).value;
            
            if(sA === "" || sB === "") {
                tg.showAlert("يرجى إدخال النتيجة كاملة!");
                return;
            }

            tg.showConfirm(`توقعك هو ${sA} - ${sB}، هل تريد التأكيد؟`, (ok) => {
                if(ok) {
                    // هنا نرسل البيانات لـ Google Script Webhook
                    tg.sendData(JSON.stringify({match_id: id, scoreA: sA, scoreB: sB}));
                    tg.close();
                }
            });
        }
    </script>
</body>
</html>
