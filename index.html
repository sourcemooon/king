<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Predictor Pro 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mainbg: '#050810',
                        glass: 'rgba(255, 255, 255, 0.03)',
                        accent: '#00f2ff', // نيون سايان
                        gold: '#ffae00'
                    },
                    backgroundImage: {
                        'gradient-main': 'linear-gradient(135deg, #050810 0%, #0d1224 100%)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: fixed no-repeat;
            background-image: theme('backgroundImage.gradient-main');
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #fff;
            user-select: none;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
        }
        .score-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        .score-input:focus {
            border-color: #00f2ff;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
            outline: none;
        }
        ::-webkit-scrollbar { display: none; }
        
        /* حركة الشريط العلوي */
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee {
            display: inline-block;
            animation: marquee 15s linear infinite;
            white-space: nowrap;
        }
    </style>
</head>
<body class="p-4 animate__animated animate__fadeIn">

    <div class="fixed top-0 left-0 w-full bg-accent/10 border-b border-accent/20 py-1 overflow-hidden z-50 glass">
        <div class="animate-marquee text-accent text-[10px] font-bold uppercase tracking-widest
