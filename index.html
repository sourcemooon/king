<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match Day Pro | أحمد محمد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        :root { --accent: #00f2ff; --bg: #05070a; --gold: #ffae00; }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a2238 0%, #05070a 80%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center; /* لتوسيط المحتوى أفقياً */
            justify-content: flex-start;
        }

        /* شريط الترحيب الثابت والراقي الجديد */
        .welcome-bar {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: rgba(0, 242, 255, 0.05);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 242, 255, 0.1);
            z-index: 100;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center; /* توسيط النص */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .welcome-text {
            color: var(--accent);
            font-weight: bold;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        /* كارت المباراة الزجاجي - أصغر وأوضح */
        .match-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            width: 100%;
            max-width: 400px; /* تحديد أقصى عرض للكارت */
            transition: all 0.3s ease;
        }

        .match-card:hover {
            border-color: rgba(0, 242, 255, 0.3);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        /* مدخلات النتيجة */
        .score-box {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: var(--accent);
            font-size: 1.8rem;
            font-weight: 900;
            transition: 0.3s;
            width: 65px;
            height: 65px;
            text-align: center;
        }

        .score-box:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        /* زر الإرسال */
        .btn-confirm {
            background: var(--accent);
            color: #000;
            font-weight: 900;
            border-radius: 16px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-confirm:active { transform: scale(0.97); }

        /* شعار نيون بالوسط */
        .neon-logo {
            font-size: 2rem;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.7);
            margin-bottom: 10px;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-16 pb-10 px-4">

    <div class="welcome-bar">
        <p class="welcome-text">أهلاً بكِ في عالم التوقعات ✨</p>
    </div>

    <div class="w-full max-w-lg flex flex-col items-center">

        <header class="w-full max-w-[400px] mb-8 flex items-center justify-between p-4 match-card animate__animated animate__fadeInDown">
            <div class="flex items-center gap-3">
                <img id="u_img" src="https://via.placeholder.com/100" class="w-12 h-12 rounded-full border-2 border-accent/20">
                <div>
                    <p class="text-[10px] text-accent font-bold opacity-70 tracking-widest">المحلل الرياضي</p>
                    <h1 id="u_name" class="font-black text-sm uppercase">جاري التحميل...</h1>
                </div>
            </div>
            <div class="text-[10px] font-bold text-gray-600">2026 PRO</div>
        </header>

        <div class="neon-logo animate__animated animate__zoomIn">⚽</div>

        <h3 class="text-sm font-black text-white/40 mb-6 tracking-[3px] uppercase border-b border-accent/20 pb-1">توقعات اليوم والغد</h3>

        <main id="matches-list" class="space-y-6 w-full flex flex-col items-center">
            
            <div class="match-card p-5 animate__animated animate__fadeInUp">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[9px] bg-white/5 px-3 py-1 rounded-full text-gray-500 font-bold uppercase tracking-widest">دوري أبطال أوروبا</span>
                    <span class="text-[10px] text-red-500 font-black">يقفل قبل 30 د</span>
                </div>

                <div class="flex items-center justify-between gap-2 mb-5">
                    <div class="flex flex-col items-center gap-2 w-1/3">
                        <img src="https://crests.football-data.org/86.png" class="w-14 h-14 object-contain">
                        <p class="text-[11px] font-black uppercase text-center">ريال مدريد</p>
                    </div>

                    <div class="flex flex-col items-center opacity-10">
                        <span class="text-xl font-black">VS</span>
                    </div>

                    <div class="flex flex-col items-center gap-2 w-1/3">
                        <img src="https://crests.football-data.org/57.png" class="w-14 h-14 object-contain">
                        <p class="text-[11px] font-black uppercase text-center text-gray-300">أرسنال</p>
                    </div>
                </div>

                <div class="flex justify-center items-center gap-4 mb-5">
                    <input type="number" id="scA_1" placeholder="0" class="score-box">
                    <span class="text-gray-700 font-black text-xl">:</span>
                    <input type="number" id="scB_1" placeholder="0" class="score-box">
                </div>

                <button onclick="sendPred(1)" class="btn-confirm w-full py-4 shadow-lg hover:shadow-[0_0_15px_rgba(0,242,255,0.2)]">
                    تأكيد التوقع الآن
                </button>
            </div>

        </main>

        <footer class="w-full max-w-[400px] mt-12 text-center py-6 border-t border-white/5 animate__animated animate__fadeIn">
            <p class="text-[9px] text-gray-600 uppercase tracking-[5px] mb-3">Engine by Ahmed Muhammad</p>
            <div class="inline-block px-5 py-2 rounded-xl bg-white/5 border border-white/5">
                <p class="text-xs font-bold text-white/70">
                    حقوق وبرمجة <span class="text-accent font-black">احمد محمد</span> © 2026
                </p>
            </div>
        </footer>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#05070a';
        tg.backgroundColor = '#05070a';

        // جلب بيانات المستخدم الحقيقية
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const u = tg.initDataUnsafe.user;
            document.getElementById('u_name').innerText = (u.first_name + " " + (u.last_name || "")).toUpperCase();
            if (u.photo_url) document.getElementById('u_img').src = u.photo_url;
        }

        function sendPred(id) {
            const scA = document.getElementById(`scA_${id}`).value;
            const scB = document.getElementById(`scB_${id}`).value;

            if(scA === "" || scB === "") {
                tg.HapticFeedback.notificationOccurred('error');
                tg.showAlert("يا بطل، أدخل النتيجة أولاً! 😉");
                return;
            }

            tg.HapticFeedback.impactOccurred('heavy');
            tg.showConfirm(`تأكيد التوقع: ${scA} - ${scB}؟`, (ok) => {
                if(ok) {
                    // إرسال البيانات (سنربطها لاحقاً)
                    tg.sendData(JSON.stringify({match_id: id, scoreA: scA, scoreB: scB}));
                    tg.close();
                }
            });
        }
    </script>
</body>
</html>
