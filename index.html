<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>توقعات كرة القدم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-theme-bg-color: #f5f5f5; --primary-color: #0088cc; }
        body { background-color: var(--tg-theme-bg-color); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .match-container { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 25px; margin-bottom: 20px; border: 1px solid #eee; }
        .team-box { text-align: center; }
        .team-logo { width: 60px; height: 60px; background: #eee; border-radius: 50%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-size: 25px; }
        .score-input { width: 70px; height: 50px; font-size: 24px; font-weight: bold; text-align: center; border: 2px solid #e0e0e0; border-radius: 12px; transition: 0.3s; }
        .score-input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 10px rgba(0,136,204,0.2); }
        .vs-badge { background: #f8f9fa; padding: 5px 15px; border-radius: 20px; font-style: italic; color: #777; font-weight: bold; }
        .btn-send { background: linear-gradient(45deg, #0088cc, #00aaff); border: none; padding: 15px; border-radius: 15px; font-weight: bold; font-size: 18px; color: white; width: 100%; transition: 0.3s; }
        .btn-send:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-3">

    <div class="text-center mb-4">
        <h3 style="color: #333;">بطولة التوقعات 🏆</h3>
        <p class="text-muted">أدخل توقعك للمباراة القادمة</p>
    </div>

    <div class="match-container">
        <div class="row align-items-center">
            <div class="col-4 team-box">
                <div class="team-logo mx-auto">🇮🇶</div>
                <div class="fw-bold">العراق</div>
            </div>
            
            <div class="col-4 text-center">
                <div class="d-flex justify-content-between mb-2">
                    <input type="number" id="home" class="score-input" placeholder="0">
                    <input type="number" id="away" class="score-input" placeholder="0">
                </div>
                <span class="vs-badge">VS</span>
            </div>

            <div class="col-4 team-box">
                <div class="team-logo mx-auto">🇯🇵</div>
                <div class="fw-bold">اليابان</div>
            </div>
        </div>
        <button class="btn btn-send mt-4" onclick="submitData()">تثبيت التوقع ✅</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();

        function submitData() {
            const h = document.getElementById('home').value;
            const a = document.getElementById('away').value;

            if(h === "" || a === "") {
                tg.showAlert("يا بطل، لازم تملي التوقعات أولاً! ⚽");
                return;
            }

            const result = { home: h, away: a, match: "Iraq vs Japan" };
            tg.sendData(JSON.stringify(result)); // إرسال البيانات للبوت
        }
    </script>
</body>
</html>
